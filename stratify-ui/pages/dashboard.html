<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratify — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="../assets/icon.svg">
  <link rel="stylesheet" href="../ui/colors.css">
  <link rel="stylesheet" href="../ui/typography.css">
  <link rel="stylesheet" href="../ui/components.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Additional page-specific tweaks ── */
    .kpi-grid      { align-items: stretch; }
    .charts-grid   { align-items: stretch; }
    .charts-grid .card { display: flex; flex-direction: column; }
    .chart-canvas-wrap { flex: 1; min-height: 0; position: relative; }

    /* Performance chart card */
    #chart-performance .card { height: 100%; }
    #chart-allocation .card  { height: 100%; }

    /* Logo text color in light mode */
    [data-theme="light"] .logo-full text { fill: #0F172A; }
    [data-theme="dark"]  .logo-full text { fill: #F8FAFC; }

    /* Sidebar logo SVG currentColor */
    .logo-full { color: var(--text-primary); }

    /* Override: sidebar logo uses object tag for SVG currentColor */
    .sidebar-logo .logo-full {
      filter: none;
    }

    /* Inline SVG color for logo — render as <img> so use CSS invert trick */
    [data-theme="dark"]  .logo-full { filter: brightness(0) invert(1); }
    [data-theme="light"] .logo-full { filter: none; }

    /* Health gauge arc */
    .health-arc-bg   { fill: none; stroke: var(--border-color); stroke-width: 8; }
    .health-arc-fill { fill: none; stroke-width: 8; stroke-linecap: round; }

    /* Responsive chart heights */
    .perf-canvas  { height: 260px !important; }
    .bar-canvas   { height: 200px !important; }
    .donut-canvas { height: 200px !important; max-width: 200px; margin: 0 auto; }

    @media (max-width: 768px) {
      .perf-canvas { height: 200px !important; }
    }
  </style>
</head>
<body>

<div class="app-shell">
  <!-- Sidebar mount -->
  <div id="sidebar-mount"></div>

  <!-- Main wrapper -->
  <div class="main-wrapper" id="mainWrapper">
    <!-- Topbar mount -->
    <div id="topbar-mount"></div>

    <main class="main-content">
      <div class="page-content">

        <!-- ── Page header ──────────────────────────────────── -->
        <div class="page-header">
          <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Vue d'ensemble de votre patrimoine — Mars 2026</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-secondary btn-sm" id="exportBtn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Exporter
            </button>
            <button class="btn btn-primary btn-sm" id="addTransactionBtn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Ajouter
            </button>
          </div>
        </div>

        <!-- ── KPI row ──────────────────────────────────────── -->
        <div class="grid grid-4 kpi-grid">
          <div id="kpi-networth"></div>
          <div id="kpi-cashflow"></div>
          <div id="kpi-allocation"></div>
          <div id="kpi-health"></div>
        </div>

        <!-- ── Charts row ───────────────────────────────────── -->
        <div class="grid grid-3 charts-grid">

          <!-- Performance line + cashflow bar -->
          <div class="col-span-2" id="chart-performance">
            <div class="card" style="height:100%">
              <div class="card-header">
                <div>
                  <div class="card-title">Évolution du patrimoine</div>
                  <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">Valeur totale du portefeuille</div>
                </div>
                <div id="perfChartTabs"></div>
              </div>
              <div class="chart-canvas-wrap" style="height:260px;">
                <canvas id="perfCanvas" class="perf-canvas"></canvas>
              </div>
              <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border-subtle);">
                <div class="card-title" style="margin-bottom:12px;">Flux mensuel</div>
                <div style="height:180px;position:relative;">
                  <canvas id="cashflowCanvas" class="bar-canvas"></canvas>
                </div>
              </div>
            </div>
          </div>

          <!-- Donut allocation -->
          <div id="chart-allocation">
            <div class="card" style="height:100%">
              <div class="card-header">
                <div class="card-title">Allocation d'actifs</div>
              </div>
              <div style="height:200px;position:relative;">
                <canvas id="donutCanvas" class="donut-canvas"></canvas>
              </div>
              <div id="donutLegend" style="margin-top:12px;"></div>
            </div>
          </div>

        </div>

        <!-- ── Budget & Goals row ───────────────────────────── -->
        <div class="grid grid-3">
          <div class="col-span-2" id="budget-breakdown"></div>
          <div id="goals-progress"></div>
        </div>

        <!-- ── Transaction table ────────────────────────────── -->
        <div id="transactions-section"></div>

      </div>
    </main>
  </div>
</div>

<!-- Scripts -->
<script type="module">
  import { createSidebar, initSidebarNav } from '../components/sidebar.js';
  import { createTopbar, initTopbar }     from '../components/topbar.js';
  import { createKPICard, createProgressCard, createGoalCard, createHealthScoreCard } from '../components/card.js';
  import { createLineChart, createBarChart, createDonutChart, createDonutLegend } from '../components/charts.js';
  import { createTransactionTable, initTableSort } from '../components/table.js';
  import { initNotifications, showNotification } from '../components/notification.js';

  // ── Demo data ──────────────────────────────────────────────
  const demo = {
    netWorth:           87342.50,
    netWorthChange:     +2847.30,
    netWorthChangePct:  +3.37,
    monthlyCashflow:    513,
    cashflowChangePct:  +31.8,
    cryptoAlloc:        35,
    healthScore:        72,

    performance: {
      labels: ['Sep', 'Oct', 'Nov', 'Déc', 'Jan', 'Fév', 'Mar'],
      values: [71200, 73800, 70100, 76500, 80200, 84100, 87342],
    },

    cashflow: {
      labels:   ['Oct', 'Nov', 'Déc', 'Jan', 'Fév', 'Mar'],
      income:   [3200, 3200, 3200, 3500, 3200, 3650],
      expenses: [2650, 2820, 2900, 2710, 2680, 2687],
    },

    allocation: {
      labels: ['Crypto',  'PEA',    'Livrets', 'Cash',   'Immobilier'],
      values: [35,         28,       18,         12,       7],
      colors: ['#0891B2', '#1E4096','#10B981', '#F59E0B','#6B7280'],
    },

    budget: [
      { label: 'Logement',      budgeted: 1200, actual: 1150, color: '#0891B2' },
      { label: 'Alimentation',  budgeted: 500,  actual: 487,  color: '#10B981' },
      { label: 'Transport',     budgeted: 200,  actual: 234,  color: '#F59E0B' },
      { label: 'Loisirs',       budgeted: 150,  actual: 189,  color: '#EF4444' },
      { label: 'Épargne',       budgeted: 800,  actual: 800,  color: '#1E4096' },
      { label: 'Abonnements',   budgeted: 80,   actual: 68,   color: '#8B5CF6' },
    ],

    goals: [
      { label: 'Fonds urgence',       progress: 85,  target: 10000,   current: 8500,  color: '#10B981' },
      { label: 'Liberté financière',  progress: 1.5, target: 1884800, current: 16655, color: '#0891B2' },
      { label: 'Immo',                progress: 42,  target: 50000,   current: 21000, color: '#F59E0B' },
    ],

    health: {
      score: 72,
      breakdown: [
        { label: 'Épargne',          score: 18, max: 25 },
        { label: 'Dépenses',         score: 17, max: 25 },
        { label: 'Investissements',  score: 14, max: 25 },
        { label: 'Diversification',  score: 23, max: 25 },
      ],
    },

    transactions: [
      { date: '2026-03-10', merchant: 'Carrefour',          category: 'Alimentation',   amount: -67.40,   account: 'Courant',  type: 'expense' },
      { date: '2026-03-10', merchant: 'Virement salaire',   category: 'Revenus',        amount: +3200.00, account: 'Courant',  type: 'income'  },
      { date: '2026-03-09', merchant: 'SNCF',               category: 'Transport',      amount: -34.00,   account: 'Courant',  type: 'expense' },
      { date: '2026-03-09', merchant: 'Netflix',            category: 'Loisirs',        amount: -17.99,   account: 'Courant',  type: 'expense' },
      { date: '2026-03-08', merchant: 'Coinbase',           category: 'Investissement', amount: -200.00,  account: 'Courant',  type: 'expense' },
      { date: '2026-03-07', merchant: 'Boulanger',          category: 'Shopping',       amount: -189.00,  account: 'Courant',  type: 'expense' },
      { date: '2026-03-06', merchant: 'Loyer Mars',         category: 'Logement',       amount: -1150.00, account: 'Courant',  type: 'expense' },
      { date: '2026-03-05', merchant: 'Freelance design',   category: 'Revenus',        amount: +450.00,  account: 'Courant',  type: 'income'  },
      { date: '2026-03-04', merchant: 'Uber Eats',          category: 'Alimentation',   amount: -28.70,   account: 'Courant',  type: 'expense' },
      { date: '2026-03-03', merchant: 'Livret A intérêts',  category: 'Revenus',        amount: +21.50,   account: 'Livret A', type: 'income'  },
    ],
  };

  // ── Mount sidebar & topbar ─────────────────────────────────
  document.getElementById('sidebar-mount').innerHTML = createSidebar('dashboard');
  document.getElementById('topbar-mount').innerHTML  = createTopbar();
  initSidebarNav();
  initTopbar();

  // ── KPI cards ──────────────────────────────────────────────
  document.getElementById('kpi-networth').innerHTML = createKPICard({
    title:      'Patrimoine net',
    value:      demo.netWorth,
    subtitle:   'Portefeuille + trésorerie',
    trendValue: demo.netWorthChangePct,
    color:      'secondary',
    icon:       'trending-up',
  });

  document.getElementById('kpi-cashflow').innerHTML = createKPICard({
    title:      'Flux mensuel',
    value:      demo.monthlyCashflow,
    subtitle:   'Revenus − Dépenses',
    trendValue: demo.cashflowChangePct,
    color:      'success',
    icon:       'activity',
  });

  document.getElementById('kpi-allocation').innerHTML = createKPICard({
    title:         'Allocation Crypto',
    value:         demo.cryptoAlloc,
    subtitle:      'Part du portefeuille',
    trendLabel:    '−2.1 % vs cible',
    color:         'accent',
    icon:          'pie-chart',
    valueIsPercent: true,
  });

  document.getElementById('kpi-health').innerHTML = createHealthScoreCard(demo.health);

  // ── Budget card ────────────────────────────────────────────
  document.getElementById('budget-breakdown').innerHTML = createProgressCard({
    title: 'Budget mensuel',
    items: demo.budget,
  });

  // ── Goals card ─────────────────────────────────────────────
  document.getElementById('goals-progress').innerHTML = createGoalCard({
    goals: demo.goals,
  });

  // ── Transaction table ──────────────────────────────────────
  document.getElementById('transactions-section').innerHTML =
    createTransactionTable(demo.transactions);
  initTableSort();

  // ── Charts ─────────────────────────────────────────────────
  // Performance line chart
  createLineChart('perfCanvas', demo.performance);

  // Cashflow bar chart
  createBarChart('cashflowCanvas', demo.cashflow);

  // Allocation donut
  createDonutChart('donutCanvas', {
    labels: demo.allocation.labels,
    values: demo.allocation.values,
    colors: demo.allocation.colors,
    total:  demo.netWorth,
  });

  // Donut legend
  document.getElementById('donutLegend').innerHTML = createDonutLegend(
    demo.allocation.labels,
    demo.allocation.values,
    demo.allocation.colors,
  );

  // Performance chart time-range tabs
  const tabMount = document.getElementById('perfChartTabs');
  const tabs = [
    { id: '1m', label: '1M' },
    { id: '3m', label: '3M' },
    { id: '6m', label: '6M' },
    { id: '1y', label: '1A' },
    { id: 'all', label: 'Tout' },
  ];

  const tabsHTML = `<div class="chart-tabs">
    ${tabs.map((t) => `<button class="chart-tab${t.id === '6m' ? ' active' : ''}" data-tab="${t.id}">${t.label}</button>`).join('')}
  </div>`;
  tabMount.innerHTML = tabsHTML;

  // Tab slice data
  const perfDatasets = {
    '1m':  { labels: ['1 Mar', '3 Mar', '5 Mar', '7 Mar', '9 Mar'], values: [84100, 85200, 86000, 86800, 87342] },
    '3m':  { labels: ['Jan', 'Fév', 'Mar'], values: [80200, 84100, 87342] },
    '6m':  { labels: ['Sep', 'Oct', 'Nov', 'Déc', 'Jan', 'Fév', 'Mar'], values: [71200, 73800, 70100, 76500, 80200, 84100, 87342] },
    '1y':  { labels: ['Mar\'25','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc','Jan','Fév','Mar\'26'], values: [62000, 63500, 66000, 65000, 67000, 69500, 71200, 73800, 70100, 76500, 80200, 84100, 87342] },
    'all': { labels: ['2023', 'T2 23', 'T3 23', '2024', 'T2 24', 'T3 24', 'Jan 25', 'Mar 25', 'Sep 25', 'Mar 26'], values: [35000, 38000, 42000, 48000, 52000, 57000, 60000, 62000, 71200, 87342] },
  };

  tabMount.addEventListener('click', (e) => {
    const btn = e.target.closest('.chart-tab');
    if (!btn) return;
    tabMount.querySelectorAll('.chart-tab').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    const id = btn.dataset.tab;
    createLineChart('perfCanvas', perfDatasets[id] || demo.performance);
  });

  // ── Notifications ──────────────────────────────────────────
  initNotifications();

  setTimeout(() => {
    showNotification({
      title:   'Données actualisées',
      message: 'Votre portfolio a été synchronisé avec succès.',
      type:    'success',
      duration: 5000,
    });
  }, 800);

  setTimeout(() => {
    showNotification({
      title:   'Transport dépassé',
      message: 'Vous avez dépassé votre budget Transport de 17 %.',
      type:    'warning',
      duration: 6000,
    });
  }, 2500);

  // ── Theme toggle ───────────────────────────────────────────
  // Handled inside initTopbar() — dispatches 'stratify:theme-change' event
  // Charts re-render automatically via event listener in charts.js

  // ── Export button ──────────────────────────────────────────
  document.getElementById('exportBtn')?.addEventListener('click', () => {
    showNotification({ title: 'Export en cours', message: 'Génération du rapport PDF...', type: 'info', duration: 3000 });
  });

  // ── Add transaction button ─────────────────────────────────
  document.getElementById('addTransactionBtn')?.addEventListener('click', () => {
    showNotification({ title: 'Bientôt disponible', message: 'La saisie manuelle arrive dans la v1.1.', type: 'info', duration: 3500 });
  });

</script>
</body>
</html>
